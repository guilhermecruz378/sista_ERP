{% extends 'core/base.html' %}

{% block content %}
<div class="text-center mb-5">
    <h1>Olá, {{ user.username }}!</h1>
    <p class="text-muted">O que você deseja fazer hoje?</p>
</div>

<div class="row justify-content-center">
    
    <div class="col-md-5 mb-3">
        <div class="card h-100 text-center p-4">
            <div class="card-body">
                <div style="font-size: 3rem;">📝</div>
                <h4 class="card-title mt-3">Cadastrar Produtos</h4>
                <p class="card-text">Adicionar novos itens ao banco de dados.</p>
                <a href="{% url 'cadastro' %}" class="btn btn-success btn-lg w-100">Novo Cadastro</a>
            </div>
        </div>
    </div>

    <div class="col-md-5 mb-3">
        <div class="card h-100 text-center p-4 border-primary">
            <div class="card-body">
                <div style="font-size: 3rem;">📊</div>
                <h4 class="card-title mt-3">Dashboard de B.I.</h4>
                <p class="card-text">Visualizar gráficos, relatórios e inteligência.</p>
                
                <a href="http://localhost:8501" target="_blank" class="btn btn-primary btn-lg w-100">
                    Abrir Dashboard 🚀
                </a>
            </div>
        </div>
    </div>

</div>
{% endblock %}
