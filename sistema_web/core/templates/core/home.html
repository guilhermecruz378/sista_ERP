{% extends 'core/base.html' %}

{% block content %}
<style>
    /* Estilo exclusivo para a tela de boas-vindas */
    .welcome-card {
        background-color: #ffffff;
        border-radius: 16px;
        box-shadow: 0 4px 24px rgba(145, 158, 171, 0.1);
        padding: 60px 20px;
        text-align: center;
        margin-top: 40px;
        border: 1px solid #e0e0e0;
    }
    .welcome-icon {
        font-size: 3.5rem;
        color: #1a73e8;
        background-color: #e8f0fe;
        width: 100px;
        height: 100px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        margin-bottom: 20px;
    }
</style>

<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-8">
            
            <div class="welcome-card">
                <div class="welcome-icon">
                    <i class="bi bi-rocket-takeoff-fill"></i>
                </div>
                <h2 class="fw-bold text-dark mb-3">Bem-vindo a VAREJO</h2>
                <p class="text-secondary fs-6 mb-4">
                    Tudo o que você precisa para solução de tecnologia da sua empresa está aqui. <br>
                    Selecione uma opção no menu lateral para começar.
                </p>
                
                <hr class="w-25 mx-auto mt-5 mb-4 text-muted">
                <p class="text-muted small text-uppercase fw-bold letter-spacing-1">
                    MeuERP Enterprise • Versão 1.1
                </p>
            </div>

        </div>
    </div>
</div>
{% endblock %}
