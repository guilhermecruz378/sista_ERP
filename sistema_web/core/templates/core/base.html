<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        /* Estilos base do Sistema Enterprise */
        body {
            background-color: #f4f6f8;
            font-family: 'Roboto', 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        /* --- MENU LATERAL (SIDEBAR) --- */
        .sidebar {
            width: 260px;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            background-color: #ffffff;
            box-shadow: 2px 0 12px rgba(145, 158, 171, 0.15);
            z-index: 1040;
            padding-top: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap; /* Evita quebra de texto ao encolher */
        }

        /* Botão Flutuante de Encolher no PC */
        .desktop-toggle {
            position: absolute;
            top: 25px;
            right: -15px; /* Fica metade para fora da barra */
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(26, 115, 232, 0.4);
            z-index: 1050;
            transition: transform 0.3s ease;
        }
        .desktop-toggle:hover {
            transform: scale(1.1);
        }

        /* === EFEITOS DE QUANDO A BARRA ESTÁ ENCOLHIDA === */
        .sidebar.collapsed {
            width: 80px; /* Fica fininha */
        }
        .sidebar.collapsed .desktop-toggle {
            transform: rotate(180deg); /* Vira a setinha para a direita */
        }
        .sidebar.collapsed .nav-text {
            display: none; /* Esconde os textos usando a nova classe nav-text */
        }
        .sidebar.collapsed .sidebar-brand {
            font-size: 1.5rem;
            margin-bottom: 30px;
        }
        .sidebar.collapsed .nav-sidebar .nav-link {
            text-align: center;
            padding: 12px 0;
            margin: 4px 10px;
        }
        .sidebar.collapsed .nav-sidebar i {
            margin-right: 0;
            font-size: 1.4rem;
        }

        .sidebar-brand {
            font-size: 1.25rem;
            font-weight: 700;
            color: #1a73e8;
            text-align: center;
            margin-bottom: 30px;
            display: block;
            text-decoration: none;
            transition: 0.3s;
        }

        /* Títulos das Categorias do Menu */
        .sidebar-heading {
            font-size: 0.7rem;
            font-weight: 700;
            color: #919eab;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 10px 20px 5px 20px;
            display: block;
        }
        /* Quando a barra encolhe, escondemos o título da categoria */
        .sidebar.collapsed .sidebar-heading {
            display: none; 
        }

        .nav-sidebar .nav-link {
            color: #637381;
            font-weight: 600;
            padding: 12px 20px;
            margin: 4px 15px;
            border-radius: 8px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
        }

        .nav-sidebar .nav-link:hover {
            background-color: #f4f6f8;
            color: #212b36;
        }

        .nav-sidebar .nav-link.active {
            background-color: #e8f0fe;
            color: #1a73e8;
        }

        .nav-sidebar i { margin-right: 12px; font-size: 1.1rem; }

        /* --- ACORDEON DO MENU LATERAL --- */
        .nav-item {
            width: 100%;
        }
        .nav-sidebar .nav-link {
            display: flex;
            align-items: center;
            justify-content: space-between; /* Empurra a setinha para a direita */
            cursor: pointer;
        }
        .nav-sidebar .nav-link .menu-left {
            display: flex;
            align-items: center;
        }
        
        /* Setinha animada */
        .chevron-icon {
            font-size: 0.8rem !important;
            transition: transform 0.3s ease;
            margin-right: 0 !important;
        }
        /* Gira a setinha quando o menu está aberto */
        .nav-link:not(.collapsed) .chevron-icon {
            transform: rotate(180deg);
        }

        /* Submenus (Itens filhos) */
        .submenu {
            background-color: #f8fafc; /* Fundo levemente diferenciado para filhos */
            border-radius: 8px;
            margin: 0 15px 5px 15px;
            overflow: hidden;
        }
        .submenu .nav-link {
            padding: 8px 15px 8px 40px; /* Mais recuo para mostrar hierarquia */
            margin: 2px 0;
            font-size: 0.9rem;
            color: #637381;
            border-radius: 0;
        }
        .submenu .nav-link:hover {
            background-color: #e8f0fe;
            color: #1a73e8;
        }

        /* Esconde a setinha quando a barra principal encolher pro PC */
        .sidebar.collapsed .chevron-icon {
            display: none;
        }
        .sidebar.collapsed .submenu .nav-link {
            padding-left: 0;
            justify-content: center;
        }

        /* --- ÁREA PRINCIPAL --- */
        .main-content {
            margin-left: 260px; /* Espaço da sidebar aberta */
            padding: 20px;
            min-height: 100vh;
            transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* Quando o menu encolhe, a área principal expande preenchendo o vazio */
        .main-content.expanded {
            margin-left: 80px; 
        }

        .mobile-header {
            display: none;
            background-color: #ffffff;
            box-shadow: 0 2px 8px rgba(145, 158, 171, 0.1);
            padding: 10px 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            align-items: center;
            justify-content: space-between;
        }

        /* --- RESPONSIVIDADE (CELULARES E TABLETS) --- */
        @media (max-width: 991.98px) {
            .desktop-toggle { display: none; } /* Esconde o botão de PC no celular */
            .sidebar {
                transform: translateX(-100%);
            }
            .sidebar.show {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0 !important;
                padding: 10px;
            }
            .mobile-header {
                display: flex;
            }
            .sidebar-overlay {
                position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
                background: rgba(0,0,0,0.5); z-index: 1030; display: none;
            }
            .sidebar-overlay.show { display: block; }
        }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleMobileSidebar()"></div>

    <nav class="sidebar" id="sidebar">
        
        <button class="desktop-toggle" onclick="toggleDesktopSidebar()" title="Recolher Menu">
            <i class="bi bi-chevron-left"></i>
        </button>

        <a href="{%url 'home' %}" class="sidebar-brand">
            <i class="bi bi-hexagon-fill"></i> <span class="nav-text">Varejo</span>
        </a>
        
        <div class="nav flex-column nav-sidebar" id="sidebarAccordion">
            
            <div class="nav-item">
                <a class="nav-link collapsed" data-bs-toggle="collapse" href="#menuOverview" role="button" aria-expanded="false">
                    <div class="menu-left"><i class="bi bi-display"></i> <span class="nav-text">Overview</span></div>
                    <i class="bi bi-chevron-down nav-text chevron-icon"></i>
                </a>
                <div class="collapse" id="menuOverview" data-bs-parent="#sidebarAccordion">
                    <div class="submenu flex-column">
                        <a href="{% url 'dashboard' %}" class="nav-link"><span class="nav-text">Dashboard</span></a>
                        <a href="#" class="nav-link"><span class="nav-text">Análise</span></a>
                    </div>
                </div>
            </div>

            <div class="nav-item">
                <a class="nav-link collapsed" data-bs-toggle="collapse" href="#menuCadastro" role="button" aria-expanded="false">
                    <div class="menu-left"><i class="bi bi-journal-plus"></i> <span class="nav-text">Cadastro</span></div>
                    <i class="bi bi-chevron-down nav-text chevron-icon"></i>
                </a>
                <div class="collapse show" id="menuCadastro" data-bs-parent="#sidebarAccordion">
                    <div class="submenu flex-column">
                        <a href="{% url 'cadastro' %}" class="nav-link active"><span class="nav-text">Cad. Produtos</span></a>
                        <a href="#" class="nav-link"><span class="nav-text">Cad. Profissional</span></a>
                        <a href="#" class="nav-link"><span class="nav-text">Cad. Clientes</span></a>
                    </div>
                </div>
            </div>

            <div class="nav-item">
                <a class="nav-link collapsed" data-bs-toggle="collapse" href="#menuFechamento" role="button" aria-expanded="false">
                    <div class="menu-left"><i class="bi bi-calculator"></i> <span class="nav-text">Fechamento</span></div>
                    <i class="bi bi-chevron-down nav-text chevron-icon"></i>
                </a>
                <div class="collapse" id="menuFechamento" data-bs-parent="#sidebarAccordion">
                    <div class="submenu flex-column">
                        <a href="#" class="nav-link"><span class="nav-text">Fecha Cupom</span></a>
                        <a href="#" class="nav-link"><span class="nav-text">Fecha Comissão</span></a>
                        <a href="#" class="nav-link"><span class="nav-text">Invent. Geral</span></a>
                        <a href="#" class="nav-link"><span class="nav-text">Invent. Grupo</span></a>
                    </div>
                </div>
            </div>

            <div class="nav-item">
                <a class="nav-link collapsed" data-bs-toggle="collapse" href="#menuEstoques" role="button" aria-expanded="false">
                    <div class="menu-left"><i class="bi bi-boxes"></i> <span class="nav-text">Estoques</span></div>
                    <i class="bi bi-chevron-down nav-text chevron-icon"></i>
                </a>
                <div class="collapse" id="menuEstoques" data-bs-parent="#sidebarAccordion">
                    <div class="submenu flex-column">
                        <a href="#" class="nav-link text-danger"><span class="nav-text">Estoque Negativo</span></a>
                        <a href="#" class="nav-link text-success"><span class="nav-text">Estoque Positivo</span></a>
                        <a href="#" class="nav-link text-warning"><span class="nav-text">Estoque Zerado</span></a>
                    </div>
                </div>
            </div>
            
            <hr class="mx-3 mt-4 mb-2 text-muted">
            <a href="#" class="nav-link text-danger" title="Sair do Sistema">
                <div class="menu-left"><i class="bi bi-box-arrow-left"></i> <span class="nav-text">Sair</span></div>
            </a>
        </div>
    </nav>

    <main class="main-content" id="main-content">
        
        <div class="mobile-header">
            <h5 class="mb-0 text-primary fw-bold"><i class="bi bi-hexagon-fill"></i> MeuERP</h5>
            <button class="btn btn-light border" onclick="toggleMobileSidebar()">
                <i class="bi bi-list fs-4"></i>
            </button>
        </div>

        {% block content %}{% endblock %}
        
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Função para Celular (Abre a gaveta por cima)
        function toggleMobileSidebar() {
            document.getElementById('sidebar').classList.toggle('show');
            document.getElementById('sidebarOverlay').classList.toggle('show');
        }

        // Nova Função para PC (Encolhe a barra e deixa só os ícones)
        function toggleDesktopSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
            document.getElementById('main-content').classList.toggle('expanded');
        }
    </script>
</body>
</html>
